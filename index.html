<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omar Anaya Lucio | Portfolio</title>
    <style>
        :root {
            /* Mantenemos los azules para acentos, pero el fondo será oscuro */
            --primary: #002d5b; 
            --secondary: #0056b3;
            --accent: #e6f0ff;
            --text: #333;
            --light: #f8f9fa;
            --dark-bg: #121212; /* Negro profundo para el header */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text);
            margin: 0;
            background-color: var(--light);
        }

        header {
            /* Cambio de azul a negro con un ligero degradado para profundidad */
            background: linear-gradient(135deg, #000000 0%, var(--dark-bg) 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.2); /* Borde más sutil para fondo negro */
            margin-bottom: 20px;
            object-fit: cover;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .intro {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); /* Sombra más definida */
            margin-top: -60px; /* Ajuste para que resalte sobre el negro */
            text-align: center;
        }

        h1 { margin: 10px 0; font-size: 2.5em; letter-spacing: 1px; }
        
        /* Ajuste del color del subtítulo para que sea legible sobre negro */
        .subtitle { 
            font-size: 1.2em; 
            color: #4da3ff; /* Un azul más claro para contraste sobre negro */
            font-weight: bold; 
            margin-bottom: 20px; 
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .section-title {
            text-align: center;
            margin: 50px 0 30px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

            background: white;
            padding: 30px;
            border-radius: 10px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
